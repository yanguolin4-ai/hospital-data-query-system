# ============================================
# 登录接口 - 参数化测试用例
# 每个 - 开头的块就是一组独立的测试数据
# ============================================

# 用例1：正常登录
-
  name: 正常登录-正确账号密码
  description: 使用正确的用户名和密码登录，应返回200和token
  request:
    url: http://localhost:3000/api/auth/login
    method: post
    headers:
      Content-Type: application/json
    data:
      username: admin
      password: '123456'
  expected:
    status_code: 200

# 用例2：密码错误
-
  name: 异常登录-密码错误
  description: 使用正确的用户名但错误的密码登录，应返回401
  request:
    url: http://localhost:3000/api/auth/login
    method: post
    headers:
      Content-Type: application/json
    data:
      username: admin
      password: 'wrong_password'
  expected:
    status_code: 401

# 用例3：用户名不存在
-
  name: 异常登录-用户名不存在
  description: 使用不存在的用户名登录，应返回401
  request:
    url: http://localhost:3000/api/auth/login
    method: post
    headers:
      Content-Type: application/json
    data:
      username: nonexistent_user
      password: '123456'
  expected:
    status_code: 401

# 用例4：用户名为空
-
  name: 异常登录-用户名为空
  description: 用户名为空时登录，应返回400参数校验失败
  request:
    url: http://localhost:3000/api/auth/login
    method: post
    headers:
      Content-Type: application/json
    data:
      username: ''
      password: '123456'
  expected:
    status_code: 400

# 用例5：密码为空
-
  name: 异常登录-密码为空
  description: 密码为空时登录，应返回400参数校验失败
  request:
    url: http://localhost:3000/api/auth/login
    method: post
    headers:
      Content-Type: application/json
    data:
      username: admin
      password: ''
  expected:
    status_code: 400
