<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医院数据资料查询系统</title>
  <!-- Bootstrap 5 CDN 样式 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Chart.js CDN 数据可视化 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    /* 顶部导航栏样式 */
    .navbar-brand { font-weight: 600; }
    /* 标签页内容区域 */
    .tab-content { padding: 20px 0; }
    /* 卡片统一样式 */
    .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    /* 统计卡片 */
    .stat-card {
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      color: white;
    }
    .stat-card h2 { font-size: 2rem; margin: 0; }
    .stat-card p { margin: 0; opacity: 0.9; }
    /* 接口测试模块 */
    .method-badge {
      min-width: 70px;
      text-align: center;
    }
    .response-area {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 8px;
      padding: 15px;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    /* 快捷按钮样式 */
    .quick-btn {
      font-size: 12px;
      padding: 4px 10px;
    }
    /* 表格行悬停效果 */
    .table-hover tbody tr:hover { cursor: pointer; }
    /* 加载动画 */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">🏥 医院数据资料查询系统</a>
      <div class="d-flex align-items-center">
        <span class="text-white me-3" id="userInfo">欢迎，管理员</span>
        <button class="btn btn-outline-light btn-sm" onclick="handleLogout()">退出登录</button>
      </div>
    </div>
  </nav>

  <!-- 主体内容 -->
  <div class="container mt-3">
    <!-- Bootstrap 标签页导航 -->
    <ul class="nav nav-tabs" id="mainTabs">
      <li class="nav-item">
        <a class="nav-link active" data-bs-toggle="tab" href="#patients">患者查询</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-bs-toggle="tab" href="#doctors">医生查询</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-bs-toggle="tab" href="#stats">数据统计</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-bs-toggle="tab" href="#apiTest">接口测试</a>
      </li>
    </ul>

    <div class="tab-content">
      <!-- ========== 患者查询模块 ========== -->
      <div class="tab-pane fade show active" id="patients">
        <div class="card">
          <div class="card-body">
            <!-- 搜索表单 -->
            <div class="row mb-3">
              <div class="col-md-4">
                <input type="text" class="form-control" id="patientSearch"
                       placeholder="输入患者姓名搜索...">
              </div>
              <div class="col-md-3">
                <select class="form-select" id="patientDeptFilter">
                  <option value="">全部科室</option>
                  <option value="内科">内科</option>
                  <option value="外科">外科</option>
                  <option value="儿科">儿科</option>
                  <option value="妇科">妇科</option>
                  <option value="急诊科">急诊科</option>
                </select>
              </div>
              <div class="col-md-2">
                <button class="btn btn-primary" onclick="searchPatients()">搜索</button>
              </div>
            </div>
            <!-- 患者表格 -->
            <div class="table-responsive">
              <table class="table table-hover">
                <thead class="table-light">
                  <tr>
                    <th>ID</th><th>姓名</th><th>性别</th><th>年龄</th>
                    <th>科室</th><th>诊断</th><th>状态</th><th>操作</th>
                  </tr>
                </thead>
                <tbody id="patientTableBody">
                  <tr><td colspan="8" class="text-center text-muted">加载中...</td></tr>
                </tbody>
              </table>
            </div>
            <!-- 分页 -->
            <div class="d-flex justify-content-between align-items-center" id="patientPagination"></div>
          </div>
        </div>

        <!-- 患者详情卡片 -->
        <div class="card mt-3 d-none" id="patientDetailCard">
          <div class="card-header d-flex justify-content-between">
            <h5 class="mb-0">患者详情</h5>
            <button class="btn btn-sm btn-outline-secondary" onclick="hidePatientDetail()">关闭</button>
          </div>
          <div class="card-body" id="patientDetailBody"></div>
        </div>
      </div>

      <!-- ========== 医生查询模块 ========== -->
      <div class="tab-pane fade" id="doctors">
        <div class="card">
          <div class="card-body">
            <!-- 科室筛选 -->
            <div class="row mb-3">
              <div class="col-md-3">
                <select class="form-select" id="doctorDeptFilter">
                  <option value="">全部科室</option>
                  <option value="内科">内科</option>
                  <option value="外科">外科</option>
                  <option value="儿科">儿科</option>
                  <option value="妇科">妇科</option>
                  <option value="急诊科">急诊科</option>
                </select>
              </div>
              <div class="col-md-2">
                <button class="btn btn-primary" onclick="loadDoctors()">筛选</button>
              </div>
            </div>
            <!-- 医生列表 -->
            <div class="row" id="doctorList">
              <div class="col-12 text-center text-muted">加载中...</div>
            </div>
          </div>
        </div>

        <!-- 医生详情模态框 -->
        <div class="modal fade" id="doctorModal" tabindex="-1">
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="doctorModalTitle">医生详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body" id="doctorModalBody"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ========== 数据统计模块 ========== -->
      <div class="tab-pane fade" id="stats">
        <!-- 概览卡片 -->
        <div class="row mb-4" id="statsOverview">
          <div class="col-md-3 mb-2">
            <div class="stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
              <h2 id="statTotalPatients">0</h2>
              <p>患者总数</p>
            </div>
          </div>
          <div class="col-md-3 mb-2">
            <div class="stat-card" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
              <h2 id="statInHospital">0</h2>
              <p>在院患者</p>
            </div>
          </div>
          <div class="col-md-3 mb-2">
            <div class="stat-card" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
              <h2 id="statTotalDoctors">0</h2>
              <p>医生总数</p>
            </div>
          </div>
          <div class="col-md-3 mb-2">
            <div class="stat-card" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
              <h2 id="statTotalDepts">0</h2>
              <p>科室数量</p>
            </div>
          </div>
        </div>

        <!-- 图表区域 -->
        <div class="row">
          <div class="col-md-6 mb-3">
            <div class="card">
              <div class="card-header"><strong>各科室患者与医生数量对比</strong></div>
              <div class="card-body">
                <canvas id="deptBarChart" height="250"></canvas>
              </div>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <div class="card">
              <div class="card-header"><strong>患者状态分布</strong></div>
              <div class="card-body">
                <canvas id="statusPieChart" height="250"></canvas>
              </div>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <div class="card">
              <div class="card-header"><strong>患者年龄分布</strong></div>
              <div class="card-body">
                <canvas id="ageChart" height="250"></canvas>
              </div>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <div class="card">
              <div class="card-header"><strong>性别比例</strong></div>
              <div class="card-body">
                <canvas id="genderChart" height="250"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ========== 接口测试模块 ========== -->
      <div class="tab-pane fade" id="apiTest">
        <div class="card">
          <div class="card-body">
            <!-- 快捷接口按钮 -->
            <div class="mb-3">
              <label class="form-label"><strong>快捷接口</strong></label>
              <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/auth/me')">获取用户信息</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/patients')">患者列表</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/patients/1')">患者详情(ID=1)</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/patients/search?name=王')">搜索患者(王)</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/patients/search?department=内科')">科室搜索(内科)</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/doctors')">医生列表</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/doctors/1')">医生详情(ID=1)</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/doctors?department=外科')">科室筛选(外科)</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/stats/department')">科室统计</button>
                <button class="btn btn-outline-primary quick-btn" onclick="fillApiTest('GET','/api/stats/overview')">整体概览</button>
                <button class="btn btn-outline-success quick-btn" onclick="fillApiTest('POST','/api/auth/login','{\"username\":\"admin\",\"password\":\"123456\"}')">登录接口</button>
              </div>
            </div>

            <!-- 请求配置 -->
            <div class="row mb-3">
              <div class="col-md-2">
                <select class="form-select" id="apiMethod">
                  <option value="GET">GET</option>
                  <option value="POST">POST</option>
                  <option value="PUT">PUT</option>
                  <option value="DELETE">DELETE</option>
                </select>
              </div>
              <div class="col-md-7">
                <input type="text" class="form-control" id="apiUrl" placeholder="输入接口路径，如 /api/patients">
              </div>
              <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="sendApiRequest()" id="apiSendBtn">
                  发送请求
                </button>
              </div>
            </div>

            <!-- 请求头编辑 -->
            <div class="mb-3">
              <label class="form-label"><strong>请求头 (JSON格式)</strong></label>
              <textarea class="form-control" id="apiHeaders" rows="4" style="font-family: Consolas, monospace; font-size: 13px;"></textarea>
            </div>

            <!-- 请求体编辑（仅POST/PUT显示） -->
            <div class="mb-3" id="apiBodyGroup">
              <label class="form-label"><strong>请求体 (JSON格式)</strong></label>
              <textarea class="form-control" id="apiBody" rows="6"
                        style="font-family: Consolas, monospace; font-size: 13px;"
                        placeholder='{"key": "value"}'></textarea>
            </div>

            <!-- 响应结果展示 -->
            <div class="mb-3">
              <label class="form-label"><strong>响应结果</strong></label>
              <div class="d-flex gap-3 mb-2">
                <span class="badge bg-secondary" id="apiStatusCode">状态码: -</span>
                <span class="badge bg-info" id="apiTime">耗时: -</span>
              </div>
              <div class="response-area" id="apiResponse">// 点击"发送请求"查看响应结果</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- 引入前端接口封装模块 -->
  <script src="js/api.js"></script>
  <!-- 引入前端业务逻辑代码 -->
  <script src="js/app.js"></script>
</body>
</html>
