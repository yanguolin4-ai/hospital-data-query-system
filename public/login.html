<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 医院数据资料查询系统</title>
  <!-- Bootstrap 5 CDN 样式 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* 登录页面全屏居中布局 */
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* 登录卡片样式 */
    .login-card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    /* 标题区域 */
    .login-header {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border-radius: 16px 16px 0 0;
      padding: 30px;
      text-align: center;
    }
    /* 图标样式 */
    .login-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    /* 登录按钮 */
    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 12px;
      font-size: 16px;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    }
    /* 测试账号提示 */
    .test-account {
      background-color: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card login-card">
    <!-- 页面头部 -->
    <div class="login-header">
      <div class="login-icon">🏥</div>
      <h3 class="mb-1">医院数据资料查询系统</h3>
      <small class="opacity-75">Hospital Data Query System</small>
    </div>

    <div class="card-body p-4">
      <!-- 测试账号提示 -->
      <div class="test-account mb-3 text-center">
        <strong>测试账号：</strong> admin / 123456
      </div>

      <!-- 错误提示区域 -->
      <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

      <!-- 登录表单 -->
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="mb-3">
          <label for="username" class="form-label">用户名</label>
          <input type="text" class="form-control form-control-lg" id="username"
                 placeholder="请输入用户名" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">密码</label>
          <input type="password" class="form-control form-control-lg" id="password"
                 placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white" id="loginBtn">
          登 录
        </button>
      </form>
    </div>

    <div class="card-footer text-center text-muted py-3" style="border-radius: 0 0 16px 16px; border-top: none;">
      <small>前后端学习项目 &copy; 2025</small>
    </div>
  </div>

  <script>
    /**
     * 处理登录表单提交
     * 调用后端 /api/auth/login 接口验证身份
     */
    async function handleLogin(event) {
      event.preventDefault(); // 阻止表单默认提交行为

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorAlert = document.getElementById('errorAlert');
      const loginBtn = document.getElementById('loginBtn');

      // 隐藏之前的错误提示
      errorAlert.classList.add('d-none');

      // 简单的前端校验
      if (!username || !password) {
        showError('请输入用户名和密码');
        return false;
      }

      // 按钮显示加载状态
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';

      try {
        // 发送登录请求到后端
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (response.ok && result.code === 200) {
          // 登录成功：将Token和用户信息存入localStorage
          localStorage.setItem('token', result.data.token);
          localStorage.setItem('user', JSON.stringify(result.data.user));
          // 跳转到主页面
          window.location.href = '/index.html';
        } else {
          // 登录失败：显示错误信息
          showError(result.message || '登录失败');
        }
      } catch (error) {
        // 网络错误处理
        showError('网络错误，请检查后端服务是否启动');
      } finally {
        // 恢复按钮状态
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
      }

      return false;
    }

    /**
     * 显示错误提示
     */
    function showError(message) {
      const errorAlert = document.getElementById('errorAlert');
      errorAlert.textContent = message;
      errorAlert.classList.remove('d-none');
    }

    // 页面加载时检查是否已登录
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (token) {
        // 已登录则直接跳转到主页面
        window.location.href = '/index.html';
      }
    });
  </script>
</body>
</html>
